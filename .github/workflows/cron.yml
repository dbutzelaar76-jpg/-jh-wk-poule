name: Scorito Stand Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Scorito Scraper
      env:
        SCORITO_USER: ${{ secrets.SCORITO_USER }}
        SCORITO_PASS: ${{ secrets.SCORITO_PASS }}
      run: |
        python scrape.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Scorito Bot"
        git config --global user.email "bot@github.com"
        
        touch stand.json
        git add stand.json
        if git diff --staged --quiet; then
          echo "Geen wijzigingen in de stand. JSON is ongewijzigd."
        else
          git commit -m "Automatische update: Scorito stand bijgewerkt"
          git push
        fi
