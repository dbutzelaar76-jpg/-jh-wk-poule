name: Scorito Scraper Cronjob

on:
  schedule:
    # Draait elke 30 minuten tussen 07:00 en 23:00 UTC
    - cron: '*/30 7-23 * * *'
  
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache-dependency-path: 'requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Web Browser Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2t64
        playwright install chromium --with-deps

    - name: Run Scorito Scraper
      env:
        SCORITO_USER: ${{ secrets.SCORITO_USER }}
        SCORITO_PASS: ${{ secrets.SCORITO_PASS }}
      run: |
        python scrape.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "Scorito Bot"
        git config --global user.email "bot@github.com"
        
        git add stand.json
        if git diff --staged --quiet; then
          echo "Geen wijzigingen in de stand. JSON is ongewijzigd."
        else
          git commit -m "Automatische update: Scorito stand bijgewerkt"
          git push
        fi
