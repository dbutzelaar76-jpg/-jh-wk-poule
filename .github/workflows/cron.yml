name: Scorito Scraper Cronjob

on:
  schedule:
    # Draait elke 30 minuten tussen 07:00 en 23:00 UTC
    - cron: '*/30 7-23 * * *'
  
  # Hiermee kun je het script handmatig starten via de GitHub website
  workflow_dispatch:

# Hiermee dwingen we de runner om direct Node.js 24 te gebruiken voor de acties (voldoet aan de 2026-eisen)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    # 1. Haal de code uit je repository op
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Installeer Python op de virtuele machine (Nu met de juiste invoer-naam)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache-dependency-path: 'requirements.txt'

    # 3. Installeer de benodigde Python-pakketten
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Installeer de Chromium-browser voor Playwright
    - name: Install Playwright Web Browser
      run: |
        playwright install chromium --with-deps

    # 5. Voer het Python-script uit en geef de GitHub Secrets mee
    - name: Run Scorito Scraper
      env:
        SCORITO_USER: ${{ secrets.SCORITO_USER }}
        SCORITO_PASS: ${{ secrets.SCORITO_PASS }}
      run: |
        python scrape.py

    # 6. Push de nieuwe stand.json automatisch terug naar je repository
    - name: Commit and Push changes
      run: |
        git config --global user.name "Scorito Bot"
        git config --global user.email "bot@github.com"
        
        git add stand.json
        if git diff --staged --quiet; then
          echo "Geen wijzigingen in de stand. JSON is ongewijzigd."
        else
          git commit -m "Automatische update: Scorito stand bijgewerkt"
          git push
        fi
