name: Scorito Scraper Cronjob

on:
  schedule:
    # Dit zorgt ervoor dat het script elke 30 minuten draait, 
    # maar ALLEEN tussen 07:00 en 23:00 UTC (om GitHub-tegoed te besparen).
    # Pas de tijden aan op basis van wanneer de wedstrijden live zijn!
    - cron: '*/30 7-23 * * *'
  
  # Hiermee kun je het script ook handmatig starten via de GitHub website (handig om te testen)
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    # 1. Haal de code uit je repository op
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Installeer Python op de virtuele machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.11'
        cache-dependency-path: 'requirements.txt'

    # 3. Installeer de benodigde Python-pakketten (Playwright)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Installeer de Chromium-browser die Playwright nodig heeft om te kunnen inloggen
    - name: Install Playwright Web Browser
      run: |
        playwright install chromium --with-deps

    # 5. Voer het Python-script uit en geef de GitHub Secrets (inloggegevens) mee
    - name: Run Scorito Scraper
      env:
        SCORITO_USER: ${{ secrets.SCORITO_USER }}
        SCORITO_PASS: ${{ secrets.SCORITO_PASS }}
      run: |
        python scrape.py

    # 6. Push de nieuwe stand.json automatisch terug naar je repository
    - name: Commit and Push changes
      run: |
        git config --global user.name "Scorito Bot"
        git config --global user.email "bot@github.com"
        
        # Controleer of stand.json daadwerkelijk is veranderd om loze commits te voorkomen
        git add stand.json
        if git diff --staged --quiet; then
          echo "Geen wijzigingen in de stand. JSON is ongewijzigd."
        else
          git commit -m "Automatische update: Scorito stand bijgewerkt"
          git push
        fi
