name: Scorito Stand Scraper

on:
  schedule:
    # Dit zorgt ervoor dat hij elke 15 minuten draait
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Hiermee behoud je de "Run workflow" knop in GitHub Actions

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ensure Playwright is installed
      run: |
        pip install playwright
        playwright install chromium --with-deps

    - name: Run Scorito Scraper
      env:
        SCORITO_USER: ${{ secrets.SCORITO_USER }}
        SCORITO_PASS: ${{ secrets.SCORITO_PASS }}
      run: |
        python scrape.py

    - name: Upload Page Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scorito-page-screenshots
        path: "*.png"

    - name: Commit and Push changes
      run: |
        git config --global user.name "Scorito Bot"
        git config --global user.email "bot@github.com"
        
        git add stand.json
        if git diff --staged --quiet; then
          echo "Geen wijzigingen in de stand. JSON is ongewijzigd."
        else
          git commit -m "Automatische update: Scorito stand bijgewerkt"
          git push
        fi
